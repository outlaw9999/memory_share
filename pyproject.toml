[project]
name = "memory_share_kit"
version = "1.3.1"
description = "The Architecture Memory Protocol (AMP) Kernel - Deterministic Logic for AI Agents"
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
authors = [{ name = "Kiến trúc sư trưởng - [Văn Trường]" }]
keywords = [
    "architecture-memory",
    "amp-protocol",
    "ai-native",
    "graph-analysis",
    "deterministic-reasoning",
    "elite-py-314",
]
dependencies = ["watchdog>=3.0.0", "pytest>=7.0.0"]

[project.scripts]
kit = "kit.main:main"

[tool.setuptools]
packages = ["kit"]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
