[project]
name = "memory-share-kit"
version = "1.1.0"
description = "AI-Native Semantic Code Intelligence Engine for 50M+ LOC Monorepos"
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
authors = [{ name = "Antigravity Team" }]
keywords = [
    "static-analysis",
    "llm",
    "codebase-intelligence",
    "graph-slice",
    "mcp",
    "llm-tools",
    "graph-analysis",
]
dependencies = ["watchdog>=3.0.0", "pytest>=7.0.0"]

[project.scripts]
kit = "kit.main:main"

[tool.setuptools]
packages = ["kit"]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
