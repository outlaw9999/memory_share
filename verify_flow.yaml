flow:
  id: "final_test"
  name: "Verification Flow"
  steps:
    - id: "learn_step"
      command: 'kit learn --uid test_flow_fact --content "Flow engine v0.1.2 is alive" --tag decision'
      idempotent: true
      retry: 1
    - id: "verify_step"
      command: "kit stats"
      depends_on: ["learn_step"]
      idempotent: false
