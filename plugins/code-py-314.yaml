name: code-py-314
version: 1.0.0
grade: TITANIUM
category: architecture
mindset: "Concurrency Correctness & Async Hygiene"
triggers:
  - "concurrency"
  - "async"
  - "thread-safe"
  - "py314"
rules:
  hygiene:
    - "No blocking I/O in hot async paths (detect sync bottleneck)"
    - "Prefer structured concurrency via TaskGroup over create_task"
    - "No shared mutable state across thread boundaries without explicit sync"
    - "Isolate CPU-heavy tasks to separate processes or specific executors"
  lint:
    - "Flag bare except: blocks for risk of swallowing CancelledError"
    - "Ensure all async entry points have a defined timeout or heart-beat"
    - "Validate thread-safety of singleton accessors"
  nogil_ready:
    - "Audit and remove Single-thread lock assumptions"
    - "Treat all global variables as read-only or protected by high-level abstractions"
