name: architecture_review
version: 1
schema_version: 1
description: "Pre-merge architecture impact assessment for pull requests"
author: ".kit"
tags: [review, pr, agent-secondary]
cost: medium
depends_on: [architecture_summary]

inputs:
  - name: changed_files
    type: text
    description: "Space-separated list of changed files (relative paths)"
  
  - name: severity_threshold
    type: suggest[critical, warning, info]
    default: warning
    description: "Minimum severity level to report"

uses:
  - stone: impact
    required: true
  - stone: doctor
  - stone: drift
    required: true

interpretation:
  rules:
    - if: "impact_blast_radius > 50 modules"
      then: severity = CRITICAL
      reason: "Change affects large portion of codebase; high regression risk"
      recommendation: "Require extended testing and peer review"
    
    - if: "impact_touching_hot_modules == true"
      then: severity = WARNING
      reason: "Changes touch architectural hotspots"
      recommendation: "Verify no new dependencies introduced"
    
    - if: "drift_violations > 0"
      then: severity = WARNING
      reason: "This change violates architectural layers"
      recommendation: "Restructure to follow layer constraints"
    
    - if: "impact_blast_radius < 5 AND no_layer_violations"
      then: severity = HEALTHY
      recommendation: "Safe to merge; low architectural impact"

  activation_level:
    hot:
      - "large blast radius (>50 modules)"
      - "touching hotspots"
      - "layer violations"
    warm:
      - "moderate impact (10-50 modules)"
      - "multiple file changes"
    cold:
      - "isolated changes"
      - "test/doc only"

output:
  type: object
  schema:
    skill: string
    version: integer
    severity: enum[CRITICAL, WARNING, HEALTHY]
    summary: string
    findings: list[string]
    recommendations: list[string]
    activation_level: enum[hot, warm, cold]
    confidence: number
    execution_time_ms: number

agent_context:
  when_to_invoke: "PR review workflow before merge approval"
  input_prompt: "Assess architectural impact of this PR"
  output_instructions: |
    Use approval_criteria to decide review rigor:
    - CRITICAL: Require architect review + extended tests
    - WARNING: Standard review + regression tests
    - HEALTHY: Can fast-track if code review is good
    
    Always list hotspots touched — reviewers need to inspect those carefully.
  estimated_tokens: "200-600"
  timeout_seconds: 20
