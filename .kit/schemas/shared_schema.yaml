# Shared Entity Schema v0.1
# Purpose: Unified data exchange between .kit (Logic) and memory_share (Semantic)

version: "0.1"

# Root Entity Definition
entity:
  id: "uuid/string"
  type: "symbol | memory | decision | policy"
  source: ".kit | memory_share"
  confidence: "0.0 - 1.0"
  timestamp: "ISO8601"

# Sub-types definitions
types:
  symbol:
    name: "AuthService"
    kind: "class | function | module"
    location:
      path: "src/auth/service.py"
      line: 42
    graph_context:
      incoming_edges: ["caller1", "caller2"]
      outgoing_edges: ["dependency1"]

  memory:
    name: "Short descriptive name"
    content_summary: "Nén thông tin ngữ nghĩa (short string)"
    references:
      - id: "related_symbol_id"
        type: "symbol"
    layer: "1 | 2 | 3"

  decision:
    title: "Design Decision Title"
    rationale: "Why we did this"
    status: "active | deprecated | superseded"
    related_to: ["symbol_name", "policy_name"]

  policy:
    name: "Architecture Rule Name"
    rule_type: "banned_library | layered_violation | naming_convention"
    severity: "CRITICAL | WARNING | INFO"
    remediation: "How to fix it"

# Schema for Cognitive Bundle (The final context sent to LLM)
cognitive_bundle:
  task_id: "uuid"
  original_query: "user input"
  logic_graph_slice:
    entities: ["list of symbols"]
    relationships: ["list of edges"]
  semantic_neurons:
    entities: ["list of memories/decisions"]
  fused_summary: "High-level integration hint for the worker agent"
