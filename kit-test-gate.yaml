version: v1.2.5-TITANIUM
strategy: "Tiered Release-Gate"

gates:
  P0_CONTRACT:
    description: "Must pass to allow commit. CLI, Errors, and Output."
    priority: 0
    blocking: true
    tests:
      - "tests/test_kit_system_contract.py"
      - "tests/test_cognitive_kernel.py"
      - "tests/test_architecture_lock.py"
      - "tests/test_memory_isolation.py"
      - "tests/test_sealed_contract.py"

  P1_FLOW:
    description: "Must pass for release. Core workflows and recovery."
    priority: 1
    blocking: true
    tests:
      - "tests/test_recovery.py"
      - "tests/test_resilience.py"
      - "tests/test_flow_core.py"

  P2_STRESS:
    description: "Production Stress (Stability Soak)"
    priority: 2
    blocking: false
    tests:
      - "tests/test_scaling.py"

reporting:
  stdout: "minimal"
  fail_on_first_blocking: true
